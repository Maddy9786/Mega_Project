---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: bankapp
spec:
  accessModes:
      - ReadWriteOnce
  resources:
    requests:
     storage: 5Gi
  storageClassName: gp3

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-pvc
  namespace: bankapp
spec:
  accessModes:
      - ReadWriteOnce
  resources:
    requests:
       storage: 10Gi
  storageClassName: gp3